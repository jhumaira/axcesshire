<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Get Started | AxcessHire</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
  <a href="index.html" class="logo">AxcessHire</a>
  <nav>
    <a href="how-it-works.html">How It Works</a>
    <a href="pricing.html">Pricing</a>
    <a href="who-we-help.html">Who We Help</a>
    <a href="faq.html">FAQ</a>
  </nav>
  <a href="get-started.html" class="nav-btn">Upload My Resume</a>
</header>

<section class="page-hero">
  <p class="badge">Get Started</p>
  <h1>Start with your resume.</h1>
  <p>Upload your information and tell us what kind of roles you want.</p>
</section>

<section class="section">
  <div class="upload-card">
    <h2>Resume Upload Form</h2>
    <p>This is where your intake form will go.</p>

    <form 
  action="https://formspree.io/f/mvznkeyr" 
  method="POST" 
  enctype="multipart/form-data"
>
  <input type="text" name="full_name" placeholder="Full Name" required>

  <input type="email" name="email" placeholder="Email Address" required>

  <input type="tel" name="phone" placeholder="Phone Number">

  <input type="file" name="resume" accept=".pdf,.doc,.docx" required>

  <input type="text" name="target_job_titles" placeholder="Target Job Titles">

  <input type="text" name="preferred_locations" placeholder="Preferred Locations">

  <select name="work_style">
    <option value="">Remote / Hybrid / Onsite</option>
    <option value="Remote">Remote</option>
    <option value="Hybrid">Hybrid</option>
    <option value="Onsite">Onsite</option>
    <option value="Open to all">Open to all</option>
  </select>

  <input type="text" name="salary_target" placeholder="Salary Target">

  <input type="text" name="work_authorization" placeholder="Work Authorization">

  <input type="url" name="linkedin_url" placeholder="LinkedIn URL">

  <textarea name="industries_to_avoid" placeholder="Industries to avoid"></textarea>

  <textarea name="companies_to_avoid" placeholder="Companies to avoid"></textarea>

  <textarea name="additional_notes" placeholder="Anything else we should know?"></textarea>

  <button type="submit">Submit My Resume</button>
</form>
  </div>
</section>

<footer>
  <p>© 2026 AxcessHire.</p>
</footer>

</body>
</html>
