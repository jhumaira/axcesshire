<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Get Started | AxcessHire</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
  <a href="index.html" class="logo">AxcessHire</a>
  <nav>
    <a href="how-it-works.html">How It Works</a>
    <a href="pricing.html">Pricing</a>
    <a href="who-we-help.html">Who We Help</a>
    <a href="faq.html">FAQ</a>
  </nav>
  <a href="get-started.html" class="nav-btn">Upload My Resume</a>
</header>

<section class="page-hero">
  <p class="badge">Get Started</p>
  <h1>Start with your resume.</h1>
  <p>Upload your information and tell us what kind of roles you want.</p>
</section>

<section class="section">
  <div class="upload-card">
    <h2>Resume Upload Form</h2>
    <p>This is where your intake form will go.</p>

    <form>
      <input type="text" placeholder="Full Name">
      <input type="email" placeholder="Email Address">
      <input type="tel" placeholder="Phone Number">
      <input type="file">
      <input type="text" placeholder="Target Job Titles">
      <input type="text" placeholder="Preferred Locations">
      <select>
        <option>Remote</option>
        <option>Hybrid</option>
        <option>Onsite</option>
        <option>Open to all</option>
      </select>
      <input type="text" placeholder="Salary Target">
      <input type="text" placeholder="Work Authorization">
      <input type="url" placeholder="LinkedIn URL">
      <textarea placeholder="Industries or companies to avoid"></textarea>
      <textarea placeholder="Anything else we should know?"></textarea>
      <button class="primary-btn">Submit My Resume</button>
    </form>
  </div>
</section>

<footer>
  <p>© 2026 AxcessHire.</p>
</footer>

</body>
</html>
