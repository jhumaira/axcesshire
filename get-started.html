</head>
<body>

    <header class="navbar">

        <a href="index.html" class="logo">
          <img src="Logo.png" alt="AxcessHire Logo">
        </a>
      
        <nav>
          <a href="how-it-works.html">How It Works</a>

        <a href="get-started.html" class="nav-btn">
          Upload My Resume
        </a>
      
      </header>

<section class="page-hero">
  <p class="badge">Get Started</p>
  <h1>Start with your resume.</h1>
  <p>Upload your information and tell us what kind of roles you want.</p>
</section>

<section class="section">
  <div class="upload-card">
    <h2>Resume Upload Form</h2>
    <p>This is where your intake form will go.</p>

    <form 
  action="https://formspree.io/f/mvznkeyr" 
  method="POST" 
  enctype="multipart/form-data"
>
  <input type="text" name="full_name" placeholder="Full Name" required>

  <input type="email" name="email" placeholder="Email Address" required>

  <input type="tel" name="phone" placeholder="Phone Number">

  <input type="text" name="target_job_titles" placeholder="Target Job Titles">

  <select name="work_style">
    <option value="">Preferred Locations</option>
    <option value="Remote">Remote</option>
    <option value="Hybrid">Hybrid</option>
    <option value="Onsite">Onsite</option>
    <option value="Open to all">Open to all</option>
  </select>

  <input type="text" name="salary_target" placeholder="Salary Target">

  <input type="text" name="work_authorization" placeholder="Work Authorization">

  <input type="url" name="linkedin_url" placeholder="LinkedIn URL">

  <input type="file" name="resume" accept=".pdf,.doc,.docx" required>

  <button type="submit" class="primary-btn">
    Submit My Resume
  </button>
</form>
  </div>
</section>

<footer>
  <p>© 2026 AxcessHire.</p>
</footer>

</body>
</html>
